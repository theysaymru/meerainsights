version: '3.9'

services:
  backend:
    build: ./backend
    container_name: meera-backend
    ports:
      - "8090:8090"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: meera-frontend
    ports:
      - "9080:9080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
